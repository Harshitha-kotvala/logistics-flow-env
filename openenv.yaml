id: logistics_flow
name: Logistics Flow Environment
description: >
  A warehouse management simulation where an agent manages inventory,
  fulfills orders, and minimizes penalties under time constraints.

entrypoint: server.app:app

tasks:
  - id: easy
    description: Single low-priority laptop order with a lenient deadline
    grader: tasks.grade_easy
  - id: medium
    description: Three laptop orders with mixed priorities and tight deadlines
    grader: tasks.grade_medium
  - id: hard
    description: Five high-priority laptop orders with short deadlines
    grader: tasks.grade_hard

observation_space:
  type: object
  properties:
    orders:
      type: array
    step:
      type: integer
    done:
      type: boolean
    feedback:
      type: string

action_space:
  type: object
  properties:
    order_id:
      type: integer
    reasoning:
      type: string

env_vars:
  - name: API_KEY
    required: true
  - name: API_BASE_URL
    required: true
  - name: MODEL_NAME
    required: false
    default: gpt-4o-mini
